name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ['8.0.x', '10.0.x']
        include:
          - dotnet-version: '10.0.x'
            dotnet-quality: 'preview'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          dotnet-quality: ${{ matrix.dotnet-quality || 'ga' }}

      - name: Restore
        run: dotnet restore web-explorer.sln

      - name: Build
        run: dotnet build web-explorer.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test web-explorer.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.dotnet-version }}
          path: ./TestResults/*.trx
