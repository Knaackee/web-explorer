name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore web-explorer.sln

      - name: Build
        run: dotnet build web-explorer.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test web-explorer.sln --no-build --configuration Release --filter "Category!=Cli"    

  pack-nuget:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          dotnet-quality: preview

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Pack WebExplorer
        run: dotnet pack src/WebExplorer/WebExplorer.csproj -c Release -o ./artifacts/nuget /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack WebExplorer.Content
        run: dotnet pack src/WebExplorer.Content/WebExplorer.Content.csproj -c Release -o ./artifacts/nuget /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack WebExplorer.Extensions
        run: dotnet pack src/WebExplorer.Extensions/WebExplorer.Extensions.csproj -c Release -o ./artifacts/nuget /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v') && secrets.NUGET_API_KEY != ''
        run: >
          dotnet nuget push artifacts/nuget/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./artifacts/nuget/*.nupkg

  publish-cli:
    needs: build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: wxp-win-x64.exe
          - os: windows-latest
            rid: win-arm64
            artifact: wxp-win-arm64.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact: wxp-linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: wxp-linux-arm64
          - os: macos-latest
            rid: osx-x64
            artifact: wxp-osx-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: wxp-osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Publish CLI
        run: >
          dotnet publish src/WebExplorer.Cli/WebExplorer.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv ./publish/wxp ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv ./publish/wxp.exe ${{ matrix.artifact }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    needs: [pack-nuget, publish-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/nupkgs/*.nupkg
            ./artifacts/wxp-win-x64.exe/wxp-win-x64.exe
            ./artifacts/wxp-win-arm64.exe/wxp-win-arm64.exe
            ./artifacts/wxp-linux-x64/wxp-linux-x64
            ./artifacts/wxp-linux-arm64/wxp-linux-arm64
            ./artifacts/wxp-osx-x64/wxp-osx-x64
            ./artifacts/wxp-osx-arm64/wxp-osx-arm64
